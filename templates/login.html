{% extends 'base.html' %}
{% block title %}Login — MoodFlow{% endblock %}
{% block head %}
<style>
  .wrap{min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:40px 20px;background:radial-gradient(ellipse 65% 55% at 50% 35%,rgba(192,132,252,0.1) 0%,transparent 65%);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;animation:fadeUp 0.45s ease both;}
  .ttl{font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:6px;}
  .sub{color:var(--muted);font-size:0.9rem;margin-bottom:34px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-size:0.77rem;color:var(--muted);margin-bottom:7px;letter-spacing:0.8px;text-transform:uppercase;}
  .field input{width:100%;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.95rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
  .field input:focus{border-color:var(--a1);}
  .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:all 0.2s;}
  .btn:hover{opacity:.88;transform:translateY(-1px);}
  .foot{text-align:center;margin-top:22px;color:var(--muted);font-size:0.87rem;}
  .foot a{color:var(--a1);}
  .err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:11px 16px;color:#f87171;font-size:0.87rem;margin-bottom:20px;}
</style>
{% endblock %}
{% block content %}
<div class="wrap"><div class="card">
  <h1 class="ttl">Welcome back ✦</h1>
  <p class="sub">Log in to discover what your mood calls for tonight.</p>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="field"><label>Username</label><input type="text" name="username" autofocus placeholder="your_username" required/></div>
    <div class="field"><label>Password</label><input type="password" name="password" placeholder="••••••••" required/></div>
    <button type="submit" class="btn">Log In →</button>
  </form>
  <div class="foot">No account? <a href="/register">Create one</a></div>
</div></div>
{% endblock %}
